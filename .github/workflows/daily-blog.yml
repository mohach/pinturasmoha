name: Daily Blog Post

on:
  # Run every day at 8:00 AM UTC (10:00 AM Spain time)
  schedule:
    - cron: '0 8 * * *'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  generate-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push back to repo

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install google-genai Pillow

      - name: Run blog bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python pinturasmohabot.py

      - name: Commit and push new post
        run: |
          git config user.name  "Pinturas Moha Bot"
          git config user.email "bot@pinturasmoha.es"
          git add src/content/blog/ public/images/blog/
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "📝 Blog post: $(date '+%Y-%m-%d')"
          git push
