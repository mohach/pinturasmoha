name: Daily Blog Post

on:
  schedule:
    - cron: '0 8 * * *'   # 8:00 AM UTC = 10:00 AM Spain
  workflow_dispatch:        # manual trigger from GitHub UI

jobs:
  generate-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests Pillow

      - name: Run blog bot
        env:
          DEEPSEEK_API_KEY:    ${{ secrets.DEEPSEEK_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: python pinturasmohabot.py

      - name: Commit and push
        run: |
          git config user.name  "Pinturas Moha Bot"
          git config user.email "bot@pinturasmoha.es"
          git add src/content/blog/ public/images/blog/
          git diff --staged --quiet || git commit -m "📝 Blog post: $(date '+%Y-%m-%d')"
          git push
